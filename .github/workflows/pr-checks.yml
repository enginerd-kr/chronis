name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check .

      - name: Run type checker
        run: uv run mypy chronis/

      - name: Run unit and integration tests
        run: uv run pytest tests/unit/ tests/integration/ -v --cov=chronis --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --no-cov -m e2e

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  claude-review-and-label:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude review and label decision
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request.

            Goals:
            1. Check correctness, regression risk, tests, error handling, and security.
            2. Leave normal review comments if needed.
            3. Return ONLY structured output for labels using this policy:

            Label policy:
            - "needs-test" if tests are missing for meaningful logic changes
            - "risk-high" if auth, payments, deletes, migrations, concurrency, or security-sensitive code changed
            - "needs-human-review" if the change is large, ambiguous, or architecture-affecting
            - "safe-small-change" if the change is low-risk and straightforward

            Rules:
            - Choose zero or more labels from exactly this set:
              ["needs-test", "risk-high", "needs-human-review", "safe-small-change"]
            - Do not invent labels
            - If "risk-high" is present, do not include "safe-small-change"
            - If tests already sufficiently cover the change, do not include "needs-test"
          claude_args: |
            --json-schema {
              "type": "object",
              "properties": {
                "labels": {
                  "type": "array",
                  "items": {
                    "type": "string",
                    "enum": [
                      "needs-test",
                      "risk-high",
                      "needs-human-review",
                      "safe-small-change"
                    ]
                  },
                  "uniqueItems": true
                },
                "summary": {
                  "type": "string"
                }
              },
              "required": ["labels"]
            }

      - name: Debug structured output
        run: |
          echo '${{ steps.claude.outputs.structured_output }}'

      - name: Apply labels
        if: ${{ fromJSON(steps.claude.outputs.structured_output).labels[0] != null }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABELS_JSON: ${{ steps.claude.outputs.structured_output }}
        run: |
          echo "$LABELS_JSON" | jq -r '.labels[]' | while read label; do
            gh pr edit "$PR_NUMBER" --add-label "$label"
          done
