name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect code changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'chronis/**'
              - 'tests/**'
              - 'examples/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/pr-checks.yml'

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check .

      - name: Run type checker
        run: uv run mypy chronis/

      - name: Run unit and integration tests
        run: uv run pytest tests/unit/ tests/integration/ -v --cov=chronis --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Run E2E tests
        run: uv run pytest tests/e2e/ -v --no-cov -m e2e

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  claude-review-and-label:
    needs: [changes, lint-and-test]
    if: always() && needs.changes.result == 'success' && github.event.pull_request.head.repo.full_name == github.repository && (needs.lint-and-test.result == 'success' || needs.lint-and-test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude review and label decision
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            Review this pull request.

            Goals:
            1. Check correctness, regression risk, tests, error handling, and security.
            2. Leave normal review comments if needed.
            3. Decide which labels to apply based on the policy below.

            Label policy:
            - "needs-test" if tests are missing for meaningful logic changes
            - "risk-high" if auth, payments, deletes, migrations, concurrency, or security-sensitive code changed
            - "needs-human-review" if the change is large, ambiguous, or architecture-affecting
            - "safe-small-change" if the change is low-risk and straightforward

            Rules:
            - Choose zero or more labels from exactly this set:
              ["needs-test", "risk-high", "needs-human-review", "safe-small-change"]
            - Do not invent labels
            - If "risk-high" is present, do not include "safe-small-change"
            - If tests already sufficiently cover the change, do not include "needs-test"

            At the very end of your response, output the chosen labels on a single line in this exact format:
            LABELS: label1, label2
            If no labels apply, output:
            LABELS: none

      - name: Sync managed labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          MANAGED_LABELS=("needs-test" "risk-high" "needs-human-review" "safe-small-change")

          CURRENT=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')

          CLAUDE_OUTPUT=""
          if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            CLAUDE_OUTPUT=$(jq -r '.[] | select(.type == "result") | .result // .content // empty' "$EXECUTION_FILE" 2>/dev/null || cat "$EXECUTION_FILE" 2>/dev/null)
          fi

          TARGET=$(echo "$CLAUDE_OUTPUT" | grep -oP '(?<=LABELS: ).*' | tr ',' '\n' | sed 's/ //g' | grep -v '^none$' | grep -v '^$' || true)

          for label in "${MANAGED_LABELS[@]}"; do
            if echo "$CURRENT" | grep -qx "$label"; then
              if ! echo "$TARGET" | grep -qx "$label"; then
                gh pr edit "$PR_NUMBER" --remove-label "$label"
              fi
            fi
          done

          for label in $TARGET; do
            if printf '%s\n' "${MANAGED_LABELS[@]}" | grep -qx "$label"; then
              gh pr edit "$PR_NUMBER" --add-label "$label"
            fi
          done
